name=UngulaJson
version=1.1.0
author=Alex Conesa <alexconesap@gmail.com>
maintainer=Alex Conesa <alexconesap@gmail.com>
sentence=High-performance embedded C++ libraries for ESP32, STM32 and other MCUs: compact JSON parser, builder and zero-alloc single-key extractor.
paragraph=Embedded C++17 JSON. Three modes: JsonWrapper (full parser with dotted-path lookup), JsonObject builder (order-preserving) with serializeJson, and constant-memory single-key extractors that scan raw text without building a tree. No Arduino headers, no exceptions, no logging. Supported targets: ESP32, STM32 and other MCUs — pure C++17, no platform bindings.
category=Data Processing
url=https://github.com/alexconesap/ungula-json.git
includes=ungula_json.h
depends=UngulaCore
architectures=*
